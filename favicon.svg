<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg { fill: #f2e6d0; }
    .mark { stroke: #c5612e; }
    .dot { fill: #e2ad54; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1d1610; }
      .mark { stroke: #e18a58; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="14"/>
  <!-- "8" for Devcon 8: two rings, smaller over larger -->
  <g class="mark" fill="none" stroke-width="6" stroke-linecap="round">
    <circle cx="32" cy="22.5" r="9"/>
    <circle cx="32" cy="43" r="12"/>
  </g>
  <!-- marigold accent: the sun over Mumbai -->
  <circle class="dot" cx="47.5" cy="14.5" r="4"/>
</svg>
